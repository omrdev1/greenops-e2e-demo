name: GreenOps Carbon Analysis

on:
  pull_request:
    paths:
      - 'terraform/**.tf'
      - '.github/workflows/greenops.yml'

jobs:
  greenops:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download GreenOps CLI
        run: |
          npm install -g greenops-cli@0.7.0

      - name: Generate plan JSON from Terraform config
        run: |
          # Use the greenops-cli built-in e2e fixture as the plan
          # This avoids needing real AWS credentials for the demo
          node -e "
            const fs = require('fs');
            const plan = {
              format_version: '1.2',
              terraform_version: '1.7.5',
              planned_values: { root_module: { resources: [] } },
              resource_changes: [
                {
                  address: 'aws_instance.web',
                  mode: 'managed',
                  type: 'aws_instance',
                  name: 'web',
                  provider_name: 'registry.terraform.io/hashicorp/aws',
                  change: {
                    actions: ['create'],
                    before: null,
                    after: {
                      instance_type: 'm5.xlarge',
                      availability_zone: 'us-east-1a',
                      tags: { Name: 'greenops-demo-web', Environment: 'demo' }
                    },
                    after_unknown: { id: true }
                  }
                },
                {
                  address: 'aws_instance.api',
                  mode: 'managed',
                  type: 'aws_instance',
                  name: 'api',
                  provider_name: 'registry.terraform.io/hashicorp/aws',
                  change: {
                    actions: ['create'],
                    before: null,
                    after: {
                      instance_type: 'm5.large',
                      availability_zone: 'us-east-1a',
                      tags: { Name: 'greenops-demo-api', Environment: 'demo' }
                    },
                    after_unknown: { id: true }
                  }
                },
                {
                  address: 'aws_db_instance.main',
                  mode: 'managed',
                  type: 'aws_db_instance',
                  name: 'main',
                  provider_name: 'registry.terraform.io/hashicorp/aws',
                  change: {
                    actions: ['create'],
                    before: null,
                    after: {
                      instance_class: 'db.m5.large',
                      availability_zone: 'us-east-1a',
                      engine: 'mysql',
                      db_name: 'demodb'
                    },
                    after_unknown: { id: true }
                  }
                }
              ],
              configuration: {
                provider_config: {
                  aws: {
                    name: 'aws',
                    full_name: 'registry.terraform.io/hashicorp/aws',
                    expressions: { region: { constant_value: 'us-east-1' } }
                  }
                },
                root_module: {
                  resources: [
                    {
                      address: 'aws_instance.web',
                      mode: 'managed',
                      type: 'aws_instance',
                      name: 'web',
                      provider_config_key: 'aws',
                      expressions: {
                        instance_type: { constant_value: 'm5.xlarge' },
                        availability_zone: { constant_value: 'us-east-1a' }
                      }
                    },
                    {
                      address: 'aws_instance.api',
                      mode: 'managed',
                      type: 'aws_instance',
                      name: 'api',
                      provider_config_key: 'aws',
                      expressions: {
                        instance_type: { constant_value: 'm5.large' },
                        availability_zone: { constant_value: 'us-east-1a' }
                      }
                    },
                    {
                      address: 'aws_db_instance.main',
                      mode: 'managed',
                      type: 'aws_db_instance',
                      name: 'main',
                      provider_config_key: 'aws',
                      expressions: {
                        instance_class: { constant_value: 'db.m5.large' },
                        availability_zone: { constant_value: 'us-east-1a' }
                      }
                    }
                  ]
                }
              },
              timestamp: new Date().toISOString(),
              errored: false
            };
            fs.writeFileSync('plan.json', JSON.stringify(plan, null, 2));
            console.log('plan.json written with', plan.resource_changes.length, 'resources');
          "

      - name: GreenOps Carbon Analysis
        uses: omrdev1/greenops-cli@v0.7.0
        with:
          plan-file: plan.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          post-suggestions: true
          api-key: ${{ secrets.GREENOPS_API_KEY }}
